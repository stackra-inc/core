name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        env:
          # Authenticates the @heroui-pro/react postinstall with the CDN so
          # Pro components + types are fetched during release builds too.
          # https://heroui.pro/docs/react/getting-started/installation#cicd
          HEROUI_AUTH_TOKEN: ${{ secrets.HEROUI_AUTH_TOKEN }}
        run: pnpm install --frozen-lockfile

      # -----------------------------------------------------------------
      # setup-node's registry-url writes an .npmrc at $RUNNER_TEMP/.npmrc
      # containing `_authToken=${NODE_AUTH_TOKEN}` and points
      # NPM_CONFIG_USERCONFIG at it. If NODE_AUTH_TOKEN isn't set, npm sends
      # the literal placeholder as auth and returns 401. Replace that file
      # with an explicit authToken so pnpm and npm both authenticate.
      # -----------------------------------------------------------------
      - name: Configure npm registry auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.STACKRA_NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::STACKRA_NPM_TOKEN is empty. Check secret exists at repo or org level and is visible to this repo."
            exit 1
          fi
          echo "Token length: ${#NODE_AUTH_TOKEN}"
          echo "Token prefix: ${NODE_AUTH_TOKEN:0:8}..."

          # Overwrite setup-node's placeholder .npmrc with the real token.
          cat > "$NPM_CONFIG_USERCONFIG" <<EOF
          //registry.npmjs.org/:_authToken=$NODE_AUTH_TOKEN
          registry=https://registry.npmjs.org/
          always-auth=true
          EOF

      - name: Diagnose npm auth
        run: |
          set +e
          echo "--- npm whoami ---"
          npm whoami
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "::error::npm whoami FAILED (exit $rc). Token is invalid or lacks whoami read permission."
            exit 1
          fi

          echo "--- npm access list packages @stackra ---"
          npm access list packages @stackra || echo "(no packages under @stackra yet — expected on first publish)"

          echo "--- npm org ls stackra ---"
          npm org ls stackra || echo "(cannot list org members — token may not have org read permission)"

          echo "--- npm auth verification OK ---"

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version
          publish: pnpm release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Both var names — Changesets/npm reads NPM_TOKEN; some tooling
          # reads NODE_AUTH_TOKEN. Keep them in sync.
          NPM_TOKEN: ${{ secrets.STACKRA_NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.STACKRA_NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
