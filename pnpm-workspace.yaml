# pnpm workspace + catalogs
# Docs: https://pnpm.io/pnpm-workspace_yaml
#
# Version pins live in one place. Packages consume them via
#   "some-dep": "catalog:"          → default catalog
#   "some-dep": "catalog:<name>"    → named catalog

packages:
  - 'cache'
  - 'collaboration'
  - 'container'
  - 'contracts'
  - 'coordinator'
  - 'events'
  - 'logger'
  - 'pipeline'
  - 'queue'
  - 'realtime'
  - 'scheduler'
  - 'ssr'
  - 'support'
  - 'testing'
  - 'ui'

# pnpm 11's `minimumReleaseAge` policy rejects packages published within
# the last 24h as a supply-chain safeguard. We already commit + review
# pnpm-lock.yaml, so disable the age check — otherwise every fresh
# upstream release breaks CI until 24h have elapsed.
minimumReleaseAge: 0

# ---------------------------------------------------------------------------
# Default catalog — referenced as "catalog:" in package.json files.
# ---------------------------------------------------------------------------
catalog:
  '@swc/core': ^1.10.0
  '@types/node': ^22.20.0
  '@vitest/coverage-v8': ^4.0.0
  '@vivtel/metadata': ^1.0.5
  reflect-metadata: ^0.2.2
  rimraf: ^6.0.1
  tsup: ^8.5.0
  typescript: ^6.0.0
  unplugin-swc: ^1.5.9
  vitest: ^4.0.0

# ---------------------------------------------------------------------------
# Named catalogs — referenced as "catalog:<name>" in package.json files.
# ---------------------------------------------------------------------------
catalogs:
  react:
    react: ^19.0.0
    react-dom: ^19.0.0

  types:
    '@types/react': ^19.0.0
    '@types/react-dom': ^19.0.0

# ---------------------------------------------------------------------------
# Native packages that pnpm should be allowed to run install scripts for.
# Anything not in this list is blocked by pnpm 10's postinstall policy.
#
# Notes:
#   - `@swc/core` / `esbuild` compile native bindings on install.
#   - `heroui-pro` / `@heroui-pro/react` run a postinstall that downloads
#     licensed component artifacts from HeroUI's CDN using $HEROUI_AUTH_TOKEN
#     or an interactive login. Without this allowlist entry the postinstall
#     is skipped and Pro components fail at import time. See
#     https://heroui.pro/docs/native/getting-started/installation for the
#     manual flow.
# ---------------------------------------------------------------------------
onlyBuiltDependencies:
  - '@heroui-pro/react'
  - '@swc/core'
  - esbuild
  - heroui-pro

allowBuilds:
  '@heroui-pro/react': true
  '@swc/core': true
  '@zowe/secrets-for-zowe-sdk': true
  esbuild: true
